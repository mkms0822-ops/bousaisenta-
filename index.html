<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>防災情報センター｜地震速報LIVE・災害情報</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Orbitron:wght@400;700;900&family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #04080f;
  --surface: #080f1e;
  --surface2: #0c1628;
  --surface3: #101d30;
  --accent: #ff2d2d;
  --accent2: #ff8c00;
  --safe: #00e87a;
  --blue: #00b4ff;
  --cyan: #00ffe0;
  --yellow: #ffe600;
  --purple: #cc00cc;
  --text: #d8eaf8;
  --muted: #4a6a8a;
  --border: rgba(0,180,255,0.12);
  --border-red: rgba(255,45,45,0.2);
}

/* ライトモード用の変数 */
body.light-mode {
  --bg: #ffffff;
  --surface: #f0f0f0;
  --surface2: #e0e0e0;
  --surface3: #d0d0d0;
  --text: #000000;
  --muted: #666666;
  --border: rgba(0,0,0,0.1);
}

body {
  background-color: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  margin: 0;
  padding: 0;
  transition: background-color 0.3s, color 0.3s;
}

/* リンクを別タブで開くための処理用スタイルなどは既存の構造に準拠 */
a {
  color: var(--blue);
  text-decoration: none;
}
</style>
</head>
<body>

<header style="padding:10px; border-bottom: 1px solid var(--border);">
  <button id="themeToggle" style="margin-right: 10px;">色変更</button>
  <span style="font-family:'Orbitron',monospace; font-weight:900;">LIVE</span>
</header>

<div id="updateBar"></div>
<div id="quakeList"></div>

<script>
// テーマ切り替え機能
const themeToggle = document.getElementById('themeToggle');
themeToggle.addEventListener('click', () => {
  document.body.classList.toggle('light-mode');
});

// リンクを別タブで開く修正 (HTML内の全aタグにtarget="_blank"を追加)
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('a').forEach(a => {
    a.setAttribute('target', '_blank');
    a.setAttribute('rel', 'noopener noreferrer');
  });
});
</script>

</body>
</html>

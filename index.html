<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>防災情報センター｜地震速報LIVE・災害情報</title>
<style>
:root {
  --bg: #04080f;
  --text: #d8eaf8;
  --accent: #ff2d2d;
  --blue: #00b4ff;
}

body.light-mode {
  --bg: #ffffff;
  --text: #000000;
  --accent: #cc0000;
  --blue: #0066cc;
}

body {
  background-color: var(--bg);
  color: var(--text);
  font-family: sans-serif;
  margin: 0;
  padding: 0;
  transition: 0.3s;
}

header { padding: 15px; border-bottom: 1px solid #444; display: flex; align-items: center; gap: 10px; }

/* タブ用スタイル */
.tab-container { display: flex; gap: 10px; padding: 10px; }
.tab { cursor: pointer; padding: 5px 15px; border: 1px solid var(--blue); border-radius: 4px; color: var(--blue); }
.content-area { padding: 20px; display: none; }
.content-area.active { display: block; }

a { color: var(--blue); text-decoration: none; }
</style>
</head>
<body>

<header>
  <button id="themeToggle">色変更</button>
  <span style="font-weight:bold;">LIVE</span>
</header>

<div class="tab-container">
  <div class="tab" onclick="showTab('quake')">地震情報</div>
  <div class="tab" onclick="showTab('column')">コラム</div>
</div>

<div id="quake-content" class="content-area active">
  <h2>地震速報</h2>
  <div id="quakeList">ここに地震データが表示されます</div>
</div>

<div id="column-content" class="content-area">
  <h2>コラム記事</h2>
  <p>ここにコラムの内容が入ります。</p>
  <a href="https://example.com" target="_blank">外部コラム記事を読む</a>
</div>

<script>
// テーマ切り替え
document.getElementById('themeToggle').addEventListener('click', () => {
  document.body.classList.toggle('light-mode');
});

// タブ切り替え
function showTab(tabName) {
  document.querySelectorAll('.content-area').forEach(el => el.classList.remove('active'));
  document.getElementById(tabName + '-content').classList.add('active');
}

// すべてのリンクを別タブで開く
document.querySelectorAll('a').forEach(a => {
  a.setAttribute('target', '_blank');
});
</script>

</body>
</html>

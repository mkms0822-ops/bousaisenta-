<header class="head"><div class="kicker">防災小説シリーズ</div><h1>しおりの、ない日々</h1><div class="sub">君と見つける、新しい景色</div><div class="intro">朝倉栞、二十一歳。書店員一年目。
その日の悩みは、平積みの角度だった。
午後三時、床が揺れた。トラックだと思った。違った。
二分後、書店は本の墓場になっていた。電話は繋がらない。靴はパンプス。家まで十二キロ。
そして家には、コレットがいる。三歳の保護猫。
去年、譲渡会で栞の指を舐めて、家族になった子。

——猫は、自分では逃げられない。
これは、備えなかった私たちの物語。</div></header>

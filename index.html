<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>防災情報センター｜地震速報LIVE·災害情報</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Orbitron:wght@400;700;900&family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #04080f;
  --surface: #080f1e;
  --surface2: #0c1628;
  --surface3: #101d30;
  --accent: #ff2d2d;
  --accent2: #ff8c00;
  --safe: #00e87a;
  --blue: #00b4ff;
  --cyan: #00ffe0;
  --yellow: #ffe600;
  --purple: #cc00cc;
  --text: #d8eaf8;
  --muted: #4a6a8a;
  --border: rgba(0,180,255,0.12);
  --border-red: rgba(255,45,45,0.2);
  --glow-blue: 0 0 24px rgba(0,180,255,0.25);
  --glow-red: 0 0 30px rgba(255,45,45,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans JP',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
body::after { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px); pointer-events:none; z-index:999; }
body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(0,180,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,180,255,0.03) 1px,transparent 1px); background-size:48px 48px; pointer-events:none; z-index:0; }

/* HEADER */
header { position:sticky; top:0; z-index:200; background:rgba(4,8,15,0.96); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); padding:0 28px; height:68px; display:flex; align-items:center; justify-content:space-between; }
.logo { display:flex; align-items:center; gap:14px; }
.logo-mark { position:relative; width:44px; height:44px; display:flex; align-items:center; justify-content:center; }
.logo-ring { position:absolute; width:44px; height:44px; border:2px solid var(--blue); border-radius:50%; animation:spin 8s linear infinite; }
.logo-ring2 { position:absolute; width:34px; height:34px; border:1px solid rgba(0,180,255,0.3); border-radius:50%; animation:spin 4s linear infinite reverse; }
@keyframes spin { to { transform:rotate(360deg); } }
.logo-dot { width:12px; height:12px; background:var(--blue); border-radius:50%; box-shadow:0 0 12px var(--blue); position:relative; z-index:1; }
.logo-text { font-family:'Orbitron',monospace; font-size:18px; font-weight:900; letter-spacing:0.06em; color:var(--blue); text-shadow:0 0 20px rgba(0,180,255,0.5); }
.logo-sub { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:0.18em; display:block; margin-top:2px; }
.header-status { display:flex; align-items:center; gap:18px; }
.live-badge { display:flex; align-items:center; gap:7px; font-family:'Orbitron',monospace; font-size:11px; font-weight:700; letter-spacing:0.15em; color:var(--accent); background:rgba(255,45,45,0.1); border:1px solid rgba(255,45,45,0.3); border-radius:4px; padding:5px 14px; }
.live-dot { width:8px; height:8px; background:var(--accent); border-radius:50%; animation:livePulse 1s ease-in-out infinite; }
@keyframes livePulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.3;transform:scale(0.7);} }
.clock { font-family:'Share Tech Mono',monospace; font-size:14px; color:var(--cyan); letter-spacing:0.1em; }

/* FLASH / TICKER */
#alertFlash { display:none; background:var(--accent); padding:14px 28px; font-family:'Orbitron',monospace; font-size:16px; font-weight:700; letter-spacing:0.12em; text-align:center; animation:flashAnim 0.5s ease-in-out infinite alternate; position:relative; z-index:10; }
@keyframes flashAnim { from{background:#ff2d2d;} to{background:#cc0000;} }
.ticker { background:linear-gradient(90deg,rgba(255,45,45,0.15),rgba(255,45,45,0.05)); border-bottom:1px solid rgba(255,45,45,0.2); padding:8px 0; overflow:hidden; position:relative; z-index:10; display:flex; align-items:center; }
.ticker-label { font-family:'Orbitron',monospace; font-size:11px; font-weight:700; letter-spacing:0.15em; color:var(--accent); background:rgba(255,45,45,0.15); padding:4px 16px; white-space:nowrap; border-right:1px solid rgba(255,45,45,0.25); flex-shrink:0; }
.ticker-scroll { overflow:hidden; flex:1; }
.ticker-text { font-family:'Share Tech Mono',monospace; font-size:12px; white-space:nowrap; animation:ticker 28s linear infinite; display:inline-block; }
@keyframes ticker { 0%{transform:translateX(100vw);} 100%{transform:translateX(-100%);} }

/* MAIN LAYOUT */
main { position:relative; z-index:1; max-width:1280px; margin:0 auto; padding:28px 24px; display:grid; grid-template-columns:1fr 300px; gap:22px; }

/* STATS */
.stats-row { grid-column:1/-1; display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
.stat-box { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px 22px; position:relative; overflow:hidden; transition:border-color 0.2s; animation:fadeInUp 0.5s ease both; }
.stat-box:hover { border-color:rgba(0,180,255,0.3); }
.stat-box::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
.stat-box.b1::before { background:linear-gradient(90deg,var(--blue),transparent); }
.stat-box.b2::before { background:linear-gradient(90deg,var(--cyan),transparent); }
.stat-box.b3::before { background:linear-gradient(90deg,var(--accent2),transparent); }
.stat-box.b4::before { background:linear-gradient(90deg,var(--safe),transparent); }
.stat-label { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:0.15em; color:var(--muted); text-transform:uppercase; margin-bottom:8px; }
.stat-num { font-family:'Orbitron',monospace; font-size:40px; font-weight:900; line-height:1; }
.stat-box.b1 .stat-num { color:var(--blue); text-shadow:var(--glow-blue); }
.stat-box.b2 .stat-num { color:var(--cyan); }
.stat-box.b3 .stat-num { color:var(--accent2); }
.stat-box.b4 .stat-num { color:var(--safe); }
.stat-unit { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--muted); margin-top:4px; }

/* BIG QUAKE */
#latestBig { grid-column:1/-1; background:var(--surface); border:1px solid var(--border-red); border-radius:14px; padding:24px 28px; position:relative; overflow:hidden; display:none; }
#latestBig::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at top left,rgba(255,45,45,0.07) 0%,transparent 60%); }
#latestBig.active { display:block; animation:fadeInUp 0.4s ease; }
.big-label { font-family:'Orbitron',monospace; font-size:11px; letter-spacing:0.2em; color:var(--accent); margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.big-content { display:flex; align-items:center; gap:28px; position:relative; flex-wrap:wrap; }
.big-mag { font-family:'Orbitron',monospace; font-size:72px; font-weight:900; color:var(--accent); line-height:1; text-shadow:var(--glow-red); }
.big-info h2 { font-size:24px; font-weight:900; margin-bottom:8px; }
.big-meta { font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--muted); display:flex; flex-direction:column; gap:4px; }
.big-shindo { margin-left:auto; text-align:center; }
.shindo-label { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:0.1em; margin-bottom:6px; }
.shindo-val { font-family:'Orbitron',monospace; font-size:56px; font-weight:900; line-height:1; color:var(--accent); }

/* SECTION HEAD */
.section-head { font-family:'Orbitron',monospace; font-size:11px; letter-spacing:0.2em; color:var(--muted); margin-bottom:14px; display:flex; align-items:center; gap:12px
